<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Matcher - Iniciar sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <div class="login-header">
                <h1>Iniciar sesión</h1>
                <p>Accede a la plataforma para ver tus coincidencias de vacantes.</p>
            </div>

            <div id="login-message" class="login-message" role="alert" aria-live="polite"></div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-identifier">Nombre de usuario o correo</label>
                    <input
                        type="text"
                        id="login-identifier"
                        name="username"
                        placeholder="Ingresa tu usuario o correo"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                    >
                </div>
                <a href="vistaPrincipal.html" class="ir a vista principal">
                <button type="submit" class="btn-primary">Iniciar sesión</button>
            </a>
                
            </form>

            <p class="register-text">
                ¿No tienes cuenta? Créala
                <a href="registro.html" id="register-link">Registrarse</a>
            </p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
